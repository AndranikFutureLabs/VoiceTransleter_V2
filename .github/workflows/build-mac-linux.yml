name: Build macOS & Linux

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            platform: mac
            artifact_name: VoiceTransleter-V2-macOS
          - os: macos-14
            platform: mac-arm
            artifact_name: VoiceTransleter-V2-macOS-ARM
          - os: ubuntu-22.04
            platform: linux
            artifact_name: VoiceTransleter-V2-Linux

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install FFmpeg (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: matrix.platform == 'mac' || matrix.platform == 'mac-arm'
        run: brew install ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install faster-whisper TTS
        continue-on-error: true

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build app
        run: npx electron-vite build

      - name: Build macOS (x64 + arm64)
        if: matrix.platform == 'mac' || matrix.platform == 'mac-arm'
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip code signing for open-source / unsigned builds
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Use the python3 path for the build environment
          PYTHON_PATH: python3

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
          if-no-files-found: warn
          retention-days: 30
